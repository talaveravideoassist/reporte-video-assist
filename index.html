<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TALAVERA VA UPGRADE</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#0540ed">
<style>
:root{
    --bg:#f5f7fb; --panel:#ffffff; --panel2:#eef1f8; --line:#dbe2f0;
    --text:#11142b; --muted:#6b7280; --accent:#0540ed; --accent2:#0334bd;
    --ok:#1f9d57; --bad:#d6453f; --warn:#c98a1f; --hold:#e07a1f; --alt:#b8a514; --gold:#a8821f; --radius:14px;
    --card-shadow:0 1px 3px rgba(17,20,43,.06);
  }
  html.dark{
    --bg:#0f1115; --panel:#171a21; --panel2:#1f232c; --line:#2a2f3a;
    --text:#eef0f3; --muted:#9aa3b2; --accent:#0540ed; --accent2:#2f6fe0;
    --ok:#2fb86a; --bad:#e5544f; --warn:#e0a83c; --hold:#ff8c2f; --alt:#e0c93c; --gold:#d4af37;
    --card-shadow:none;
  }
  html, body{ transition: background-color .25s ease; }
  *{box-sizing:border-box;}
  body{margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--text); padding-bottom:90px;}
  header{position:sticky; top:0; z-index:20; background:var(--panel); border-bottom:1px solid var(--line); padding:12px 16px;}
  header .brand{display:flex; align-items:center; gap:10px;}
  header .brand img{height:34px; border-radius:6px;}
  header h1{margin:0; font-size:16px; font-weight:800; letter-spacing:.5px;}
  header .sub{font-size:10px; color:var(--muted); letter-spacing:.5px;}
  header .userline{font-size:11px; color:var(--muted); display:flex; justify-content:space-between; margin-top:4px;}
  header .userline a{color:var(--accent); text-decoration:none; cursor:pointer;}
  .breadcrumb{display:flex; gap:4px; padding:10px 12px; background:var(--panel); border-bottom:1px solid var(--line);
    overflow-x:auto; white-space:nowrap; position:sticky; top:64px; z-index:19; font-size:12px;}
  .breadcrumb span{color:var(--muted); cursor:pointer;}
  .breadcrumb span.current{color:var(--accent); font-weight:700; cursor:default;}
  .breadcrumb .sep{color:var(--line); margin:0 2px;}
  main{padding:14px; max-width:780px; margin:0 auto;}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:14px; margin-bottom:14px; box-shadow:var(--card-shadow);}
  .card h2{margin:0 0 10px; font-size:15px; color:var(--accent);}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .grid3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;}
  label{font-size:11px; color:var(--muted); display:block; margin-bottom:3px;}
  input, select, textarea{width:100%; padding:10px; border-radius:10px; border:1px solid var(--line);
    background:var(--panel2); color:var(--text); font-size:14px;}
  textarea{resize:vertical; min-height:50px;}
  .field{margin-bottom:10px;}
  .row-actions{display:flex; gap:10px; margin-top:6px;}
  button{border:none; border-radius:10px; padding:11px 16px; font-size:14px; font-weight:600; cursor:pointer;}
  .btn-primary{background:var(--accent); color:#fff; flex:1;}
  .btn-secondary{background:var(--panel2); color:var(--text); border:1px solid var(--line); flex:1;}
  .btn-danger{background:transparent; color:var(--bad); border:1px solid var(--bad);}
  .btn-ghost{background:transparent; color:var(--accent); border:1px dashed var(--accent); width:100%;}
  .list{display:flex; flex-direction:column; gap:10px;}
  .item{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:12px; position:relative; cursor:pointer; box-shadow:var(--card-shadow);}
  .item:active{background:var(--panel2);}
  .item h3{margin:0 0 4px; font-size:15px;}
  .item .meta{font-size:12px; color:var(--muted); line-height:1.5;}
  .item .badge{position:absolute; top:12px; right:12px; font-size:10px; padding:3px 9px; border-radius:999px; font-weight:700;}
  .badge.use{background:rgba(47,184,106,.15); color:var(--ok); border:1px solid var(--ok);}
  .badge.circle{background:rgba(212,175,55,.18); color:var(--gold); border:1px solid var(--gold);}
  .badge.nogood{background:rgba(229,84,79,.15); color:var(--bad); border:1px solid var(--bad);}
  .badge.hold{background:rgba(255,140,47,.18); color:var(--hold); border:1px solid var(--hold);}
  .badge.alt{background:rgba(224,201,60,.18); color:var(--alt); border:1px solid var(--alt);}
  .badge.estado-encurso{background:rgba(47,184,106,.15); color:var(--ok); border:1px solid var(--ok);}
  .badge.estado-finalizado{background:rgba(79,140,255,.15); color:var(--accent); border:1px solid var(--accent);}
  .badge.estado-pausado{background:rgba(224,168,60,.15); color:var(--warn); border:1px solid var(--warn);}
  .item .actions{display:flex; gap:8px; margin-top:10px;}
  .item .actions button{flex:1; padding:7px; font-size:12px;}
  .stat-grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(70px,1fr)); gap:8px; margin-bottom:14px;}
  .stat{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:12px 6px; text-align:center;}
  .stat .num{font-size:20px; font-weight:800;}
  .stat .lbl{font-size:10px; color:var(--muted); margin-top:2px;}
  .shortcuts{display:flex; gap:10px; margin-bottom:14px;}
  .shortcut{flex:1; background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:16px; text-align:center; cursor:pointer;}
  .shortcut:active{background:var(--panel2);}
  .shortcut .ic{font-size:22px;}
  .shortcut .lbl{font-size:12px; color:var(--muted); margin-top:4px; font-weight:600;}
  .fab{position:fixed; bottom:18px; right:18px; left:18px; z-index:30; max-width:780px; margin:0 auto;}
  .empty{text-align:center; color:var(--muted); padding:40px 10px; font-size:13px;}
  .search-box{margin-bottom:10px;}
  .filters{display:flex; gap:6px; margin-bottom:10px; overflow-x:auto;}
  .filters .f{flex:0 0 auto; padding:7px 12px; border-radius:999px; font-size:12px; background:var(--panel2); border:1px solid var(--line); color:var(--muted); cursor:pointer;}
  .filters .f.sel{background:var(--accent); color:#fff; border-color:var(--accent);}
  .modal-overlay{display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:40; align-items:flex-end; justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--panel); width:100%; max-width:640px; border-radius:18px 18px 0 0; max-height:92vh; overflow-y:auto; padding:18px; padding-bottom:30px; position:relative;}
  .close-x{position:absolute; top:14px; right:18px; font-size:20px; color:var(--muted); cursor:pointer;}
  .small-note{font-size:11px; color:var(--muted); margin-top:-4px; margin-bottom:8px;}
  .section-title{font-size:13px; color:var(--accent); font-weight:700; margin:16px 0 8px; border-top:1px solid var(--line); padding-top:14px;}
  .section-title:first-of-type{border-top:none; margin-top:0; padding-top:0;}
  .cam-block{background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:10px; margin-bottom:10px;}
  .cam-block .cam-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;}
  .cam-block .cam-head b{font-size:13px;}
  .cam-block .remove-cam{color:var(--bad); font-size:12px; cursor:pointer;}
  .tag-grid{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px;}
  .tag-chip{padding:6px 10px; border-radius:999px; font-size:12px; background:var(--panel2); border:1px solid var(--line); color:var(--muted); cursor:pointer;}
  .tag-chip.sel{background:var(--accent); color:#fff; border-color:var(--accent);}
  .lock-screen{display:flex; align-items:center; justify-content:center; min-height:96vh; flex-direction:column; padding:20px;}
  .lock-screen .card{width:100%; max-width:380px; text-align:center;}
  .lock-screen h1{font-size:20px; margin-bottom:2px; letter-spacing:.5px;}
  .lock-screen .sub{color:var(--muted); font-size:11px; margin-bottom:18px; letter-spacing:.5px;}
  .pin-dots{display:flex; gap:10px; justify-content:center; margin:16px 0;}
  .pin-dots .dot{width:14px; height:14px; border-radius:50%; border:2px solid var(--accent); background:transparent;}
  .pin-dots .dot.filled{background:var(--accent);}
  .pin-pad{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-top:10px;}
  .pin-pad button{padding:16px; font-size:18px; background:var(--panel2); color:var(--text); border:1px solid var(--line);}
  .pin-pad button:active{background:var(--accent);}
  @media print{
    body{background:#fff; color:#000; padding:0;}
    header, .breadcrumb, .fab, .item .actions, .modal-overlay, #app > *:not(#reportPrintArea){display:none !important;}
    main{padding:0;}
    #reportPrintArea{display:block !important;}
    .pblock{break-inside:avoid; margin-bottom:10px;}
    .pclip{border:1px solid #ccc; border-radius:8px; padding:8px; margin:6px 0 6px 16px; overflow:auto;}
    .pclip h4{margin:0 0 3px; font-size:13px;}
    .pclip .meta{font-size:11px; color:#333;}
    .proll{font-size:15px; font-weight:bold; margin-top:14px; border-bottom:2px solid #000; padding-bottom:3px;}
    .pescena{font-size:13px; font-weight:bold; margin:10px 0 2px 8px;}
    .pplano{font-size:12px; font-weight:bold; margin:6px 0 2px 12px; color:#333;}
    .pheader h1{font-size:18px; margin:0 0 4px;}
    .pheader p{font-size:12px; margin:1px 0; color:#333;}
    .pstats{display:flex; gap:14px; font-size:12px; margin:10px 0 16px; font-weight:bold; flex-wrap:wrap;}
    .pdisclaimer{font-size:10px; color:#555; font-style:italic; border:1px solid #999; padding:8px; border-radius:6px; margin:10px 0;}
    .ppriority{font-size:9px; color:#777; font-style:italic; margin-top:6px;}
    .ptech{font-size:11px; color:#333; margin:4px 0 10px;}
  }
  #reportPrintArea{display:none;}
</style>
</head>

function load(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(raw){ try{ state = JSON.parse(raw); }catch(e){} }
  ['projects','rolls','escenas','planos','clips','customTags'].forEach(k=>{ if(!state[k]) state[k]=[]; });
  if(!state.branding) state.branding = {title:'TALAVERA', subtitle:'VIDEO ASSIST SERVICE PROFESIONAL', desc:''};
}
function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function getStorageUsedMB(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY) || '';
    const bytes = new Blob([raw]).size;
    return bytes / (1024*1024);
  }catch(e){ return 0; }
}
function fmtMB(mb){ return mb < 0.1 ? '<0.1 MB' : mb.toFixed(1)+' MB'; }
function uid(p){ return p+'_'+Date.now()+'_'+Math.floor(Math.random()*1000); }
function now(){ return Date.now(); }
function fmtDate(ts){ if(!ts) return '-'; const d = new Date(ts); return d.toLocaleDateString('es-PE')+' '+d.toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'}); }

function go(view, ids){ nav = Object.assign({view}, ids||{}); closeModal(); render(); window.scrollTo(0,0); }
// goDirect: navegación que SÍ guarda historial (para breadcrumb, items, atajos)
let navHistory = [];
function goDirect(view, ids){
  navHistory.push(JSON.parse(JSON.stringify(nav)));
  if(navHistory.length>30) navHistory.shift();
  go(view, ids);
}
function goBack(){
  if(!navHistory.length){ go('dashboard'); return; }
  const prev = navHistory.pop();
  nav = prev; closeModal(); render(); window.scrollTo(0,0);
}
function toast(msg){
  let t = document.createElement('div');
  t.textContent = msg;
  t.style.position='fixed'; t.style.bottom='100px'; t.style.left='50%'; t.style.transform='translateX(-50%)';
  t.style.background='#1f232c'; t.style.color='#eef0f3'; t.style.border='1px solid #2fb86a';
  t.style.padding='12px 20px'; t.style.borderRadius='999px'; t.style.fontSize='13px'; t.style.fontWeight='600';
  t.style.zIndex='9999'; t.style.boxShadow='0 4px 16px rgba(0,0,0,.4)'; t.style.maxWidth='90%'; t.style.textAlign='center';
  t.style.transition='opacity .3s, transform .3s'; t.style.opacity='0';
  document.body.appendChild(t);
  requestAnimationFrame(()=>{ t.style.opacity='1'; t.style.transform='translateX(-50%) translateY(-6px)'; });
  setTimeout(()=>{ t.style.opacity='0'; setTimeout(()=>t.remove(), 300); }, 2200);
}
// Diálogos propios (no dependen de confirm()/alert() del navegador, que algunos visores no soportan)
function customConfirm(message, onYes, danger){
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay open';
  overlay.style.zIndex = 9998;
  overlay.innerHTML = `<div class="modal" style="max-width:340px; border-radius:18px; text-align:center; padding-bottom:18px;">
    <p style="font-size:14px; margin:6px 0 18px; line-height:1.5;">${message}</p>
    <div class="row-actions">
      <button class="btn-secondary" id="cc_no">Cancelar</button>
      <button class="${danger?'btn-danger':'btn-primary'}" style="flex:1; ${danger?'background:rgba(229,84,79,.15);':''}" id="cc_yes">${danger?'Sí, eliminar':'Confirmar'}</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  document.getElementById('cc_no').onclick = ()=> overlay.remove();
  document.getElementById('cc_yes').onclick = ()=> { overlay.remove(); onYes(); };
}
function customAlert(message){
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay open';
  overlay.style.zIndex = 9998;
  overlay.innerHTML = `<div class="modal" style="max-width:340px; border-radius:18px; text-align:center; padding-bottom:18px;">
    <p style="font-size:14px; margin:6px 0 18px; line-height:1.5;">${message}</p>
    <button class="btn-primary" style="width:100%" id="ca_ok">Entendido</button>
  </div>`;
  document.body.appendChild(overlay);
  document.getElementById('ca_ok').onclick = ()=> overlay.remove();
}
// Fix de teclado en iPad/iPhone: iOS no actualiza vh cuando aparece el teclado,
// así que sincronizamos la altura real del overlay con el viewport visual (visualViewport API).
function syncOverlayToViewport(){
  const overlay = document.getElementById('modalOverlay');
  if(!overlay) return;
  const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  overlay.style.height = h + 'px';
  const modal = overlay.querySelector('.modal');
  if(modal) modal.style.maxHeight = Math.round(h*0.94) + 'px';
}
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', syncOverlayToViewport);
  window.visualViewport.addEventListener('scroll', syncOverlayToViewport);
}
window.addEventListener('resize', syncOverlayToViewport);
document.addEventListener('focusin', (e)=>{
  if(e.target.matches('input, textarea, select')){
    syncOverlayToViewport();
    setTimeout(()=>{
      syncOverlayToViewport();
      e.target.scrollIntoView({block:'center', behavior:'smooth'});
    }, 350);
  }
});
document.addEventListener('focusout', (e)=>{
  if(e.target.matches('input, textarea, select')){
    setTimeout(syncOverlayToViewport, 350);
  }
});

// ---------- GETTERS ----------
const getProject = id=>state.projects.find(x=>x.id===id);
const getRoll = id=>state.rolls.find(x=>x.id===id);
const getEscena = id=>state.escenas.find(x=>x.id===id);
const getPlano = id=>state.planos.find(x=>x.id===id);
const rollsOf = pid=>state.rolls.filter(r=>r.projectId===pid);
const escenasOf = rid=>state.escenas.filter(e=>e.rollId===rid);
const planosOf = eid=>state.planos.filter(p=>p.escenaId===eid);
const clipsOf = plid=>state.clips.filter(c=>c.planoId===plid);

function planosOfRoll(rollId){ const eids = escenasOf(rollId).map(e=>e.id); return state.planos.filter(p=>eids.includes(p.escenaId)); }
function clipsOfRoll(rollId){ const plids = planosOfRoll(rollId).map(p=>p.id); return state.clips.filter(c=>plids.includes(c.planoId)); }
function clipsOfEscena(escenaId){ const plids = planosOf(escenaId).map(p=>p.id); return state.clips.filter(c=>plids.includes(c.planoId)); }
function escenasOfProject(projectId){ const rids = rollsOf(projectId).map(r=>r.id); return state.escenas.filter(e=>rids.includes(e.rollId)); }
function planosOfProject(projectId){ const eids = escenasOfProject(projectId).map(e=>e.id); return state.planos.filter(p=>eids.includes(p.escenaId)); }
function clipsOfProject(projectId){ const plids = planosOfProject(projectId).map(p=>p.id); return state.clips.filter(c=>plids.includes(c.planoId)); }
function lastUpdateRoll(rollId){ const r=getRoll(rollId); let m=r.updatedAt||0; escenasOf(rollId).forEach(e=>{ m=Math.max(m,e.updatedAt||0); planosOf(e.id).forEach(p=>{ m=Math.max(m,p.updatedAt||0); clipsOf(p.id).forEach(c=>m=Math.max(m,c.updatedAt||0)); }); }); return m; }
function lastUpdateEscena(escenaId){ const e=getEscena(escenaId); let m=e.updatedAt||0; planosOf(escenaId).forEach(p=>{ m=Math.max(m,p.updatedAt||0); clipsOf(p.id).forEach(c=>m=Math.max(m,c.updatedAt||0)); }); return m; }
function lastUpdatePlano(planoId){ const p=getPlano(planoId); let m=p.updatedAt||0; clipsOf(planoId).forEach(c=>m=Math.max(m,c.updatedAt||0)); return m; }
function lastUpdateProject(projectId){ const p=getProject(projectId); let m=p.updatedAt||0; rollsOf(projectId).forEach(r=>m=Math.max(m,lastUpdateRoll(r.id))); return m; }

// ---------- RENDER ROOT ----------
function render(){
  const app = document.getElementById('app');
  if(nav.view==='lock') return app.innerHTML = renderLock();
  if(nav.view==='dashboard') return app.innerHTML = renderHeader()+renderDashboard();
  if(nav.view==='projects') return app.innerHTML = renderHeader()+renderBreadcrumbSimple('Proyectos')+renderProjectsList();
  if(nav.view==='project') return app.innerHTML = renderHeader()+renderBreadcrumb()+renderProject();
  if(nav.view==='roll') return app.innerHTML = renderHeader()+renderBreadcrumb()+renderRoll();
  if(nav.view==='escena') return app.innerHTML = renderHeader()+renderBreadcrumb()+renderEscena();
  if(nav.view==='plano') return app.innerHTML = renderHeader()+renderBreadcrumb()+renderPlano();
  if(nav.view==='reports') return app.innerHTML = renderHeader()+renderBreadcrumbSimple('Reportes')+renderReports();
}

function renderBreadcrumbSimple(label){

// ---------- LOCK / PIN ----------
function renderLock(){
  const hasPin = !!state.pin;
  if(!hasPin && pinStage==='enter') pinStage='setNew';
  let title='', sub='';
  if(pinStage==='enter'){ title='Ingresa tu PIN'; sub='Acceso privado'; }
  if(pinStage==='setNew'){ title='Crea un PIN de 4 dígitos'; sub='Protegerá tus registros'; }
  if(pinStage==='setConfirm'){ title='Confirma tu PIN'; sub='Vuelve a escribirlo'; }
  const dots = [0,1,2,3].map(i=>`<div class="dot ${i<pinBuffer.length?'filled':''}"></div>`).join('');
  const isDark = document.documentElement.classList.contains('dark');
  const logo = isDark ? LOGO_BLANCO : LOGO_AZUL;
  return `<div class="lock-screen">
    <div class="card">
      <img src="${logo}" alt="${state.branding.title}" style="height:42px; width:auto; margin-top:8px; margin-bottom:22px;">
      <p style="margin-top:14px;font-size:13px;color:var(--muted)">${title}</p>
      <div class="pin-dots">${dots}</div>
      <div class="pin-pad">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button onclick="pinPress('${n}')">${n}</button>`).join('')}
        <button onclick="pinClear()" style="background:transparent;border:none;color:var(--muted)">Borrar</button>
        <button onclick="pinPress('0')">0</button>
        <button onclick="pinBackspace()" style="background:transparent;border:none;color:var(--muted)">⌫</button>
      </div>
      ${hasPin && pinStage==='enter' ? `<p class="small-note" style="margin-top:14px;cursor:pointer;color:var(--bad)" onclick="resetAppConfirm()">¿Olvidaste tu PIN? Restablecer app (borra todo)</p>`:''}
    </div>
  </div>`;
}
function pinPress(d){
  if(pinBuffer.length>=4) return;
  pinBuffer += d;
  render();
  if(pinBuffer.length===4){ setTimeout(handlePinComplete, 150); }
}
function pinBackspace(){ pinBuffer = pinBuffer.slice(0,-1); render(); }
function pinClear(){ pinBuffer=''; render(); }
function handlePinComplete(){
  if(pinStage==='setNew'){ pinFirst=pinBuffer; pinBuffer=''; pinStage='setConfirm'; render(); return; }
  if(pinStage==='setConfirm'){
    if(pinBuffer===pinFirst){ state.pin=pinBuffer; save(); pinBuffer=''; pinStage='enter'; go('dashboard'); }
    else{ toast('⚠️ Los PIN no coinciden, intenta de nuevo.'); pinBuffer=''; pinFirst=''; pinStage='setNew'; render(); }
    return;
  }
  if(pinStage==='enter'){
    if(pinBuffer===state.pin){ pinBuffer=''; go('dashboard'); }
    else{ toast('⚠️ PIN incorrecto'); pinBuffer=''; render(); }
  }
}
function lockApp(){ pinBuffer=''; pinStage='enter'; go('lock'); }
function resetAppConfirm(){
  customConfirm('Esto borrará TODOS tus proyectos y datos guardados. ¿Seguro?', ()=>{
    customConfirm('Confirma de nuevo: esta acción no se puede deshacer.', ()=>{
      localStorage.removeItem(STORAGE_KEY);
      state = { pin:'', branding:{title:'TALAVERA', subtitle:'VIDEO ASSIST SERVICE PROFESIONAL', desc:''}, customTags:[], projects:[], rolls:[], escenas:[], planos:[], clips:[] };
      pinStage='setNew'; pinBuffer=''; render();
    }, true);
  }, true);
}

function renderStorageIndicator(){
  const mb = getStorageUsedMB();
  let color = 'var(--ok)', msg = 'Espacio saludable';
  if(mb > 6){ color = 'var(--bad)'; msg = 'Espacio alto — considera purgar proyectos antiguos'; }
  else if(mb > 3){ color = 'var(--warn)'; msg = 'Espacio moderado'; }
  const pct = Math.min(100, Math.round((mb/8)*100));
  return `<div class="card" style="padding:12px 14px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
      <span style="font-size:12px; color:var(--muted);">💾 Almacenamiento local usado</span>
      <span style="font-size:12px; font-weight:700; color:${color};">${fmtMB(mb)}</span>
    </div>
    <div style="height:6px; background:var(--panel2); border-radius:999px; overflow:hidden;">
      <div style="height:100%; width:${pct}%; background:${color}; border-radius:999px;"></div>
    </div>
    <div style="font-size:11px; color:${color}; margin-top:6px;">${msg}</div>
  </div>`;
}
function onGlobalSearch(v){
  window._globalSearch = v;
  render();
  const el = document.getElementById('globalSearch');
  if(el){ el.focus(); el.setSelectionRange(v.length, v.length); }
}
function matchesText(obj, term, fields){ return fields.some(f=> (obj[f]||'').toString().toLowerCase().includes(term)); }
function renderGlobalSearchResults(term){
  let results = [];
  state.projects.forEach(p=>{
    if(matchesText(p, term, ['nombre','productora','director','dop','videoAssist','notas','tipo']))
      results.push({type:'Proyecto', label:p.nombre, sub:p.productora||'', go:()=>go('project',{projectId:p.id})});
  });
  state.rolls.forEach(r=>{
    if(matchesText(r, term, ['nombre']))
      results.push({type:'Roll', label:r.nombre, sub:getProject(r.projectId)?.nombre||'', go:()=>go('roll',{projectId:r.projectId, rollId:r.id})});
  });
  state.escenas.forEach(e=>{
    const r=getRoll(e.rollId); if(!r) return;
    if(matchesText(e, term, ['nombre','descripcion','locacion']))
      results.push({type:'Escena', label:e.nombre, sub:r.nombre, go:()=>go('escena',{projectId:r.projectId, rollId:r.id, escenaId:e.id})});
  });
  state.planos.forEach(pl=>{
    const e=getEscena(pl.escenaId); if(!e) return; const r=getRoll(e.rollId); if(!r) return;
    if(matchesText(pl, term, ['numero','descripcion','optica','observaciones']))
      results.push({type:'Plano', label:'Plano '+pl.numero, sub:e.nombre, go:()=>go('plano',{projectId:r.projectId, rollId:r.id, escenaId:e.id, planoId:pl.id})});
  });
  state.clips.forEach(c=>{
    const pl=getPlano(c.planoId); if(!pl) return; const e=getEscena(pl.escenaId); if(!e) return; const r=getRoll(e.rollId); if(!r) return;
    const tagMatch = (c.tags||[]).some(t=>t.toLowerCase().includes(term));
    if(tagMatch || matchesText(c, term, ['numero','tomas','duracion','estado','notas']))
      results.push({type:'Clip', label:'Clip '+(c.numero||'')+(c.tomas? ' — Toma(s) '+c.tomas:''), sub:'Plano '+pl.numero, go:()=>go('plano',{projectId:r.projectId, rollId:r.id, escenaId:e.id, planoId:pl.id})});
  });
  window._globalResults = results;
  if(!results.length) return `<div class="empty">Sin resultados para "${term}"</div>`;
  return `<div class="small-note" style="margin-bottom:8px">${results.length} resultado(s)</div>
  <div class="list">
    ${results.map((res,i)=>`<div class="item" onclick="window._globalResults[${i}].go()"><span class="badge estado-encurso" style="position:static;display:inline-block;margin-bottom:4px;">${res.type}</span><h3>${res.label}</h3><div class="meta">${res.sub}</div></div>`).join('')}
  </div>`;
}

function saveProject(){
  const nombre = document.getElementById('m_nombre').value.trim();
  if(!nombre){ toast('⚠️ Ingresa el nombre del proyecto'); return; }
  const id = document.getElementById('m_id').value || uid('proj');
  const existing = getProject(id);
  const obj = { id, nombre,
    tipo: document.getElementById('m_tipo').value,
    fecha: document.getElementById('m_fecha').value,
    productora: document.getElementById('m_productora').value,
    estado: document.getElementById('m_estado').value,
    director: document.getElementById('m_director').value,
    dop: document.getElementById('m_dop').value,
    videoAssist: document.getElementById('m_videoAssist').value,
    notas: document.getElementById('m_notas').value,
    camaras: tempCams,
    formato: {
      codec: document.getElementById('m_codec').value,
      contenedor: document.getElementById('m_contenedor').value,
      bitDepth: document.getElementById('m_bitdepth').value,
      submuestreo: document.getElementById('m_submuestreo').value,
      compresion: document.getElementById('m_compresion').value
    },
    notasTecnicas: document.getElementById('m_notasTecnicas').value,
    createdAt: existing? existing.createdAt : now(),
    updatedAt: now()
  };
  const idx = state.projects.findIndex(x=>x.id===id);
  if(idx>=0) state.projects[idx]=obj; else state.projects.push(obj);
  save(); closeModal(); render();
  toast(existing? '✅ Proyecto actualizado correctamente' : '✅ Proyecto creado correctamente');
}
function exportProjectJSON(id){
  const p = getProject(id);
  if(!p) return;
  const rolls = rollsOf(id);
  const rids = rolls.map(r=>r.id);
  const escenas = state.escenas.filter(e=>rids.includes(e.rollId));
  const eids = escenas.map(e=>e.id);
  const planos = state.planos.filter(pl=>eids.includes(pl.escenaId));
  const plids = planos.map(pl=>pl.id);
  const clips = state.clips.filter(c=>plids.includes(c.planoId));
  const backup = { exportadoEl: new Date().toISOString(), proyecto: p, rolls, escenas, planos, clips };
  const blob = new Blob([JSON.stringify(backup, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const safeName = (p.nombre||'proyecto').replace(/[^a-z0-9-_]+/gi,'-');
  a.download = `respaldo-${safeName}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function deleteProjectExecute(id){
  const rids = rollsOf(id).map(r=>r.id);
  const eids = state.escenas.filter(e=>rids.includes(e.rollId)).map(e=>e.id);
  const plids = state.planos.filter(p=>eids.includes(p.escenaId)).map(p=>p.id);
  state.clips = state.clips.filter(c=>!plids.includes(c.planoId));
  state.planos = state.planos.filter(p=>!eids.includes(p.escenaId));
  state.escenas = state.escenas.filter(e=>!rids.includes(e.rollId));
  state.rolls = state.rolls.filter(r=>r.projectId!==id);
  state.projects = state.projects.filter(p=>p.id!==id);
  save();
  toast('🗑️ Proyecto eliminado');
  go('projects');
}

  const p = getProject(id);
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay open';
  overlay.style.zIndex = 9998;

// Helpers de formato automático para campos técnicos
function autoSuffix(el, suffix){
  let v = el.value.trim();
  if(!v) return;
  if(v.toLowerCase().endsWith(suffix.toLowerCase())) return;
  if(/^[\d.,\/]+$/.test(v)){ el.value = v+' '+suffix; }
}
function autoDecimals(el, decimals){
  let v = el.value.trim();
  if(!v) return;
  if(!/^\d+(\.\d+)?$/.test(v)) return; // no toca si ya tiene texto (ej. "1/48")
  if(v.includes('.')) return; // ya tiene decimales, no lo tocamos
  el.value = v + '.' + '0'.repeat(decimals);
}

let tempImagenPlano = null;
function handleFotoPlano(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    const img = new Image();
    img.onload = ()=>{
      const maxDim = 900;
      let w = img.width, h = img.height;
      if(w > h && w > maxDim){ h = Math.round(h * maxDim/w); w = maxDim; }
      else if(h > maxDim){ w = Math.round(w * maxDim/h); h = maxDim; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.72);
      tempImagenPlano = dataUrl;
      const wrap = document.getElementById('fotoPreviewWrap');
      wrap.innerHTML = `<img id="fotoPreview" src="${dataUrl}" style="max-width:140px; max-height:140px; border-radius:10px; border:1px solid var(--line); display:block;">`;
      toast('📷 Foto agregada (comprimida para ahorrar espacio)');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function quitarFotoPlano(){
  tempImagenPlano = null;
  const wrap = document.getElementById('fotoPreviewWrap');
  if(wrap) wrap.innerHTML = `<div style="font-size:12px;color:var(--muted)">Sin foto adjunta</div>`;
}

            <button class="btn-secondary" onclick="openClipModal('${pl.id}','${c.id}')">Editar</button>
            <button class="btn-danger" onclick="deleteClip('${c.id}')">Eliminar</button>
          </div>
        </div>`).join('') : `<div class="empty">Sin clips registrados en este plano.</div>`}
    </div>
  </main>
  <div class="fab"><button class="btn-primary" style="width:100%; padding:14px;" onclick="openClipModal('${pl.id}')">+ Nuevo clip</button></div>`;
}

const NOTAS_RAPIDAS = ['DIRECTOR APROBÓ','AGENCIA/CLIENTE APROBÓ','DIRECTOR, AGENCIA Y CLIENTE APROBÓ'];
let tempEstado = 'Use';
function openClipModal(planoId, id){
  const c = id? state.clips.find(x=>x.id===id): null;
  tempTags = c? [...(c.tags||[])] : [];
  tempEstado = c? (c.estado || 'Use') : 'Use';
  document.getElementById('modalContent').innerHTML = `
    <span class="close-x" onclick="closeModal()">✕</span>
    <h2>${c?'Editar':'Nuevo'} clip</h2>
    <input type="hidden" id="m_id" value="${c?c.id:''}">
    <input type="hidden" id="m_planoId" value="${planoId}">
    <div class="grid">
      <div class="field"><label>Número de clip</label><input id="c_numero" value="${c?c.numero||'':''}" placeholder="Ej. C001"></div>
      <div class="field"><label>Toma(s)</label><input id="c_tomas" value="${c?c.tomas||'':''}" placeholder="Ej. 2, 4"></div>
    </div>
    <div class="field"><label>Duración</label><input id="c_duracion" value="${c?c.duracion||'':''}" placeholder="Ej. 00:14"></div>
    <div class="field"><label>Estado</label><div class="tag-grid" id="estadoGrid"></div></div>
    <div class="field"><label>Special Tags</label>
      <div class="tag-grid" id="tagGrid"></div>
      <div class="row-actions">
        <input id="newTagInput" placeholder="Agregar tag personalizado..." style="flex:2">
        <button class="btn-secondary" style="flex:1" onclick="addCustomTag()">+ Agregar</button>
      </div>
    </div>
    <div class="field"><label>Notas rápidas (toca para insertar)</label>
      <div class="tag-grid">
        ${NOTAS_RAPIDAS.map(n=>`<div class="tag-chip" onclick="insertNotaRapida('${n.replace(/'/g,"\\'")}')">${n}</div>`).join('')}
      </div>
    </div>
    <div class="field"><label>Notas</label><textarea id="c_notas" placeholder="Otras observaciones...">${c?c.notas||'':''}</textarea></div>
    <div class="row-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveClip()">Guardar</button>
    </div>`;
  renderTagGrid();
  renderEstadoGrid();
  openModal();
}
function renderEstadoGrid(){
  const wrap = document.getElementById('estadoGrid');
  if(!wrap) return;
  wrap.innerHTML = ESTADOS_CLIP.map(s=>{
    const cls = badgeClassEstado(s);
    const sel = tempEstado===s;
    return `<div class="tag-chip ${sel?'sel '+cls+'-sel':''}" style="${sel? estadoChipStyle(cls):''}" onclick="setEstado('${s}')">${estadoEmoji(s)}${s}</div>`;
  }).join('');
}
function estadoChipStyle(cls){
  const map = { circle:'background:rgba(212,175,55,.25);color:#d4af37;border-color:#d4af37;',
                use:'background:rgba(47,184,106,.25);color:#2fb86a;border-color:#2fb86a;',
                alt:'background:rgba(224,201,60,.25);color:#e0c93c;border-color:#e0c93c;',
                hold:'background:rgba(255,140,47,.25);color:#ff8c2f;border-color:#ff8c2f;',
                nogood:'background:rgba(229,84,79,.25);color:#e5544f;border-color:#e5544f;' };
  return map[cls]||'';
}
function setEstado(s){ tempEstado = s; renderEstadoGrid(); }
function insertNotaRapida(texto){
  const ta = document.getElementById('c_notas');
  ta.value = ta.value.trim() ? ta.value.trim()+' · '+texto : texto;
}
function renderTagGrid(){
  const all = [...DEFAULT_TAGS, ...state.customTags];
  const wrap = document.getElementById('tagGrid');
  if(!wrap) return;
  wrap.innerHTML = all.map(t=>`<div class="tag-chip ${tempTags.includes(t)?'sel':''}" onclick="toggleTag('${t}')">${t}</div>`).join('');
}
function toggleTag(t){
  if(tempTags.includes(t)) tempTags = tempTags.filter(x=>x!==t); else tempTags.push(t);
  renderTagGrid();
}
function addCustomTag(){
  const input = document.getElementById('newTagInput');
  const v = input.value.trim().toUpperCase();
  if(!v) return;
  if(!state.customTags.includes(v) && !DEFAULT_TAGS.includes(v)){ state.customTags.push(v); save(); }
  tempTags.push(v);
  input.value='';
  renderTagGrid();
}
function saveClip(){
  const id = document.getElementById('m_id').value || uid('clip');
  const existing = state.clips.find(x=>x.id===id);
  const obj = { id, planoId: document.getElementById('m_planoId').value,
    numero: document.getElementById('c_numero').value,
    tomas: document.getElementById('c_tomas').value,
    duracion: document.getElementById('c_duracion').value,
    estado: tempEstado,
    tags: [...tempTags],
    notas: document.getElementById('c_notas').value,
    createdAt: existing?existing.createdAt:now(), updatedAt: now() };
  const idx = state.clips.findIndex(x=>x.id===id);
  if(idx>=0) state.clips[idx]=obj; else state.clips.push(obj);
  save(); closeModal(); render();
  toast(existing? '✅ Clip actualizado correctamente' : '✅ Clip creado correctamente');
}
function deleteClip(id){
  customConfirm('¿Eliminar este clip?', ()=>{
    state.clips = state.clips.filter(c=>c.id!==id);
    save(); render();
    toast('🗑️ Clip eliminado');
  }, true);
}

// ---------- MODAL HELPERS ----------
function abrirFotoCompleta(src){
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay open';
  overlay.style.zIndex = 9999;
  overlay.style.alignItems = 'center';
  overlay.onclick = ()=> overlay.remove();
  overlay.innerHTML = `<img src="${src}" style="max-width:92%; max-height:85vh; border-radius:12px; box-shadow:0 8px 30px rgba(0,0,0,.5);">`;
  document.body.appendChild(overlay);
}
function openModal(){ document.getElementById('modalOverlay').classList.add('open'); syncOverlayToViewport(); }
function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }

// ---------- REPORTES ----------
function renderReports(){
  const search = (window._repSearch||'').toLowerCase();
  let list = state.projects.filter(p=> !search || `${p.nombre} ${p.productora}`.toLowerCase().includes(search));
  list = [...list].sort((a,b)=>lastUpdateProject(b.id)-lastUpdateProject(a.id));
  return `<main>
    ${renderStorageIndicator()}
    <input class="search-box" placeholder="🔍 Buscar proyecto para generar reporte..." value="${window._repSearch||''}" oninput="window._repSearch=this.value; render()">
    <div class="list">
      ${list.length? list.map(p=>{
        const rolls = rollsOf(p.id), escenas = state.escenas.filter(e=>rolls.map(r=>r.id).includes(e.rollId));
        const planos = state.planos.filter(pl=>escenas.map(e=>e.id).includes(pl.escenaId));
        const clips = state.clips.filter(c=>planos.map(pl=>pl.id).includes(c.planoId));
        const cls = p.estado==='En curso'?'estado-encurso': p.estado==='Pausado'?'estado-pausado':'estado-finalizado';
        return `
        <div class="item" style="cursor:default">
          <span class="badge ${cls}">${p.estado||'-'}</span>
          <h3>${p.nombre}</h3>
          <div class="meta">
            🏢 ${p.productora||'-'} · 📅 Creado: ${fmtDate(p.createdAt)}<br>
            🎞️ ${rolls.length} roll(s) · 📌 ${escenas.length} escena(s) · ▸ ${planos.length} plano(s) · 🎬 ${clips.length} clip(s)<br>
            🕐 Última actualización: ${fmtDate(lastUpdateProject(p.id))}
          </div>
          <div class="actions">
            <button class="btn-primary" onclick="exportProjectPDF('${p.id}')">📄 Generar PDF</button>
          </div>
        </div>`;}).join('') : `<div class="empty">Sin proyectos que coincidan.</div>`}
    </div>
  </main>`;
}

// ---------- EXPORT PDF ----------
function exportProjectPDF(projectId){
  const p = getProject(projectId);
  const rolls = rollsOf(p.id);
  let totalClips=0;
  const camHtml = (p.camaras||[]).map(c=>`${c.nombre}: ${c.camMarcaModelo||'-'} ${c.opticaMarcaModelo? '| Óptica: '+c.opticaMarcaModelo:''}`).join('<br>');
  const f = p.formato||{};
  const legendHtml = `<div class="ppriority">PRIORIDAD PARA EDICIÓN: Circle Take: Máxima | Use: Alta | Alt Take: Media | Hold: Baja | No Good: Descartada.</div>`;
  let html = `<div class="pheader">
    <img src="${LOGO_AZUL}" alt="${state.branding.title}" style="height:34px; width:auto; margin-bottom:14px; display:block;">
    <h1>${p.nombre}</h1>
    <p><b>Tipo:</b> ${p.tipo||'-'} &nbsp; <b>Fecha:</b> ${p.fecha||'-'} &nbsp; <b>Estado:</b> ${p.estado||'-'}</p>
    <p><b>Casa productora:</b> ${p.productora||'-'}</p>
    <p><b>Director(a):</b> ${p.director||'-'} &nbsp; <b>DOP:</b> ${p.dop||'-'} &nbsp; <b>Video Assist:</b> ${p.videoAssist||'-'}</p>
    ${p.notas? '<p><b>Notas:</b> '+p.notas+'</p>':''}
  </div>
  <div class="ptech">
    ${camHtml? '<b>Cámaras/Ópticas:</b><br>'+camHtml+'<br>':''}
    <b>Formato:</b> Códec: ${f.codec||'-'} | Contenedor: ${f.contenedor||'-'} | Bit depth: ${f.bitDepth||'-'} | Submuestreo: ${f.submuestreo||'-'} | Compresión: ${f.compresion||'-'}
    ${p.notasTecnicas? '<br><b>Notas técnicas:</b> '+p.notasTecnicas:''}
  </div>
  <div class="pdisclaimer">Disclaimer: No todos los clips filmados serán incluidos en este reporte, sino únicamente los seleccionados por los responsables del mismo. Esto no significa que el reporte esté "incompleto", sino que ha sido debidamente filtrado.</div>
  <div id="statsPlaceholder"></div>`;

  rolls.forEach(r=>{
    html += `<div class="pblock"><div class="proll">🎞️ ROLL ${r.nombre}</div>`;
    escenasOf(r.id).forEach(e=>{
      html += `<div class="pescena">📌 ${e.nombre} ${e.locacion? '· '+e.locacion:''} ${e.descripcion? '— '+e.descripcion:''}</div>`;
      planosOf(e.id).forEach(pl=>{
        html += `<div class="pplano" style="display:flex; gap:8px; align-items:flex-start;">
          ${pl.imagen? `<img src="${pl.imagen}" style="width:90px; height:50px; object-fit:cover; border-radius:6px; border:1px solid #999; flex-shrink:0;">` : ''}
          <div>▸ Plano ${pl.numero} — ${pl.intExt||'-'}, ${pl.diaNoche||'-'}<br>
          Óptica: ${pl.optica||'-'} | Diafragma: ${pl.diafragma||'-'} | WB: ${pl.wb||'-'} | ISO/EI: ${pl.iso||'-'} | FPS: ${pl.fps||'-'} | Shutter: ${pl.shutter||'-'} | Resolución: ${pl.resolucion||'-'} | Aspect Ratio: ${pl.aspectRatio||'-'}
          ${pl.filtros? '<br>Filtros: '+pl.filtros : ''}
          ${pl.observaciones? '<br>Observaciones: '+pl.observaciones : ''}
          </div>
        </div>`;
        clipsOf(pl.id).forEach(c=>{
          totalClips++;
          html += `<div class="pclip">
            <span class="badge ${badgeClassEstado(c.estado)}" style="float:right;padding:2px 8px;border-radius:8px;font-size:10px;">${estadoEmoji(c.estado)}${c.estado||'-'}</span>
            <h4>Clip ${c.numero||''} ${c.tomas? '— Toma(s): '+c.tomas:''}</h4>
            <div class="meta">
              Duración: ${c.duracion||'-'} ${c.tags&&c.tags.length? '| Tags: '+c.tags.join(', '):''}
              ${c.notas? '<br>Notas: '+c.notas:''}
            </div>
            ${legendHtml}
          </div>`;
        });
      });
    });
    html += `</div>`;
  });

  html = html.replace('<div id="statsPlaceholder"></div>', `<div class="pstats"><span>Total clips: ${totalClips}</span></div>`);
  document.getElementById('reportPrintArea').innerHTML = html;
  setTimeout(()=>{
    try{
      window.print();
    }catch(err){
      customAlert('No se pudo abrir el diálogo de impresión en este visor. Abre el archivo directamente en Safari (no dentro de Documents) e intenta de nuevo desde ahí — Safari sí soporta "Imprimir → Guardar como PDF".');
    }
  }, 150);
}

// ---------- INIT ----------
load();
if(state.theme==='dark') document.documentElement.classList.add('dark');
nav.view = 'lock';
pinStage = state.pin ? 'enter' : 'setNew';
render();

// Registrar service worker para que la app funcione offline una vez instalada
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}
</script>
